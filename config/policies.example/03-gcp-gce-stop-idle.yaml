# EXAMPLE POLICY — copy to config/policies/ and edit to suit your environment.
#
# What this does:
#   Flags idle GCE VM instances for stopping (GCP equivalent of EC2 Stop).
#   Works the same way as the EC2 example — Argus creates a Jira ticket,
#   your team acts on it. No automated execution.
#
# GCP-specific note: stopped VMs still incur storage charges for attached
# persistent disks. If you want to eliminate all cost, delete instead of stop.

version: "1"

policy_id: gce-stop-idle-starter
name: Stop idle GCE VM instances

resource_type: compute.googleapis.com/Instance

action: stop

weight: 10

conditions:
  ai_priority: [high, medium]
  min_estimated_monthly_cost_usd: 30
  idle_days_min: 14

exclude:
  tags:
    # GCP uses labels instead of AWS-style tags — same field name in Argus.
    env: [production, prod]
    argus-ignore: ["true"]
