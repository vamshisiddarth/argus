<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo { fill: #4F46E5; }
      .wordmark {
        font-family: Inter, Poppins, Montserrat, Arial, sans-serif;
        font-size: 220px;
        font-weight: 800;
        fill: #4F46E5;
      }
    </style>
  </defs>

  <!-- Custom "A" path.
       Outer: (80,280)→(180,40)→(280,40)→(380,280)
       Inner (crossbar cutout): →(315,280)→(250,120)→(210,120)→(145,280)→Z
       Counter triangle spans: top y=40, crossbar y=120, center-x=230. -->
  <path class="logo"
        d="M80 280
           L180 40
           L280 40
           L380 280
           L315 280
           L250 120
           L210 120
           L145 280
           Z"/>

  <!-- Eye inside the A triangle counter.
       At y=80 (midpoint of counter, between y=40 and y=120):
         Left inner edge ≈ x=195, right inner edge ≈ x=265 → usable width ≈ 70px.
       Eye center: (230, 80). Eye spans x=197..263 leaving 3px margin from A walls. -->

  <!-- Top eyelid -->
  <path d="M197,80 Q230,50 263,80"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom eyelid -->
  <path d="M197,80 Q230,105 263,80"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Lashes — from points on top arc, going upward -->
  <line x1="202" y1="65" x2="197" y2="48" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="216" y1="54" x2="213" y2="37" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="230" y1="50" x2="230" y2="33" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="244" y1="54" x2="247" y2="37" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="258" y1="65" x2="263" y2="48" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Iris -->
  <circle cx="230" cy="80" r="20" fill="white"/>
  <!-- Pupil -->
  <circle cx="230" cy="80" r="8"  fill="#4F46E5"/>
  <!-- Highlight -->
  <circle cx="237" cy="73" r="4"  fill="white" opacity="0.7"/>

  <!-- "rgus" wordmark — positioned to follow the A -->
  <text x="410" y="255" class="wordmark">rgus</text>
</svg>
