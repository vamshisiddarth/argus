name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install deps
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Build
        run: mkdocs build --strict

  deploy-dev:
    name: Deploy dev docs
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install deps
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev alias
        run: mike deploy dev --push

  deploy-release:
    name: Deploy versioned docs
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install deps
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version
        id: ver
        run: echo "v=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs
        run: |
          mike deploy "${{ steps.ver.outputs.v }}" latest \
            --update-aliases \
            --push

      - name: Set default
        run: mike set-default latest --push
