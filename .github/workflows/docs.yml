name: Docs

on:
  push:
    branches:
      - main           # deploys "dev" alias
    tags:
      - "v*"           # deploys versioned + updates "latest" alias
  pull_request:
    branches:
      - main           # build-only check -- no deploy

# Only one docs deploy at a time; PRs never cancel a running deploy
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write      # mike needs push access to gh-pages branch

jobs:
  # ------------------------------------------------------------------
  # Job 1: Build (all triggers) -- catches doc errors before merge
  # ------------------------------------------------------------------
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mike needs full history to read gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Build (strict -- fails on warnings)
        run: mkdocs build --strict

  # ------------------------------------------------------------------
  # Job 2: Deploy "dev" -- only on push to main (not feature branches, not PRs)
  # ------------------------------------------------------------------
  deploy-dev:
    name: Deploy dev docs
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Configure git for mike
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev alias
        run: mike deploy dev --push --message "docs: update dev from main@${{ github.sha }}"

  # ------------------------------------------------------------------
  # Job 3: Deploy versioned release -- only on v* tags
  # ------------------------------------------------------------------
  deploy-release:
    name: Deploy versioned docs
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin mike

      - name: Configure git for mike
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs and update latest alias
        run: |
          mike deploy "${{ steps.version.outputs.version }}" latest \
            --update-aliases \
            --push \
            --message "docs: release v${{ steps.version.outputs.version }}"

      - name: Set latest as default
        run: mike set-default latest --push
